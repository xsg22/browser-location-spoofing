<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>设置 - Location Simulator</title>
    <link rel="stylesheet" href="options.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>🌍 位置模拟器配置</h1>
            <p>管理您的国家节点预设，或者导入属于自己的 JSON 节点信息。</p>
        </header>

        <div class="card">
            <div class="node-list-header">
                <h2>可用节点列表</h2>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <label id="select-all-wrapper"
                        style="display: none; cursor: pointer; color: var(--text-muted); font-size: 0.85rem;">
                        <input type="checkbox" id="select-all-cb"
                            style="margin-right: 4px; accent-color: var(--primary);"> 全选
                    </label>
                    <button id="toggle-batch-mode-btn" class="btn default"
                        style="padding: 6px 10px; font-size: 0.8rem;">批量管理</button>
                    <button id="execute-batch-delete-btn" class="btn danger"
                        style="padding: 6px 10px; font-size: 0.8rem; display: none;">🗑️ 确认删除选中</button>
                    <input type="text" id="search-nodes" class="search-input" placeholder="🔍 搜索名称, IP 或 代码...">
                </div>
            </div>
            <p class="subtitle">勾选希望在弹窗中显示的项目。点击 📌 置顶，或使用 ✏️ 编辑信息。</p>

            <div class="list-container" id="nodes-list">
                <!-- JS dynamically renders options here -->
            </div>
        </div>

        <div class="card">
            <h2>批量导入配置</h2>
            <p class="subtitle">通过 JSON 格式导入新的节点（注意这会追加或合并到当前列表）。</p>

            <textarea id="import-area" placeholder='[
  {
    "code": "US",
    "name": "安克雷奇节点",
    "region": "Anchorage",
    "ip": "50.18.142.77",
    "userAgent": "Mozilla/5.0..."
  }
]'></textarea>

            <div class="actions">
                <button id="import-btn" class="btn primary">解析并导入</button>
                <button id="reset-btn" class="btn danger">重置为默认</button>
            </div>
            <div id="import-msg" class="msg"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>编辑节点信息</h3>
            <div class="form-group">
                <label>国家代码 (Code)</label>
                <input type="text" id="edit-code" disabled>
            </div>
            <div class="form-group">
                <label>名称 (Name)</label>
                <input type="text" id="edit-name">
            </div>
            <div class="form-group">
                <label>地区 (Region / 省州代码)</label>
                <input type="text" id="edit-region" placeholder="例如 CA, NY 等（选填）">
            </div>
            <div class="form-group">
                <label>伪装 IP</label>
                <input type="text" id="edit-ip">
            </div>
            <div class="form-group">
                <label>时区 (Timezone)</label>
                <input type="text" id="edit-timezone">
            </div>
            <div class="form-group">
                <label>User-Agent (选填)</label>
                <input type="text" id="edit-ua">
            </div>
            <div class="modal-actions">
                <button id="save-edit-btn" class="btn primary">保存</button>
                <button id="close-modal-btn" class="btn default">取消</button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content">
            <h3 id="confirm-title">确认操作</h3>
            <p id="confirm-msg" style="color: var(--text-muted); margin-bottom: 20px; line-height: 1.5;">您确定要执行该操作吗？</p>
            <div class="modal-actions">
                <button id="confirm-yes-btn" class="btn danger">确定</button>
                <button id="confirm-no-btn" class="btn default">取消</button>
            </div>
        </div>
    </div>

    <script src="../shared/countries.js"></script>
    <script src="../shared/timezone_map.js"></script>
    <script src="options.js"></script>
</body>

</html>
