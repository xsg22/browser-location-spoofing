<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Simulator</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="extension-container">
    <div class="header">
      <div class="logo">
        <div class="globe-icon">🌍</div>
        <h1>位置模拟器</h1>
      </div>
      <div class="header-actions" style="display: flex; gap: 10px; align-items: center;">
        <svg id="settings-btn"
          style="cursor: pointer; width: 22px; height: 22px; color: var(--text-muted); transition: color 0.2s;"
          fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
          </path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
          </path>
        </svg>
        <label class="switch">
          <input type="checkbox" id="toggle-power">
          <span class="slider round"></span>
        </label>
      </div>
    </div>

    <div class="status-card" id="status-card">
      <div class="status-indicator"></div>
      <div class="status-text" id="status-text">模拟器已关闭</div>
    </div>

    <div class="main-content">
      <label>选择目标国家/地区</label>
      <div class="custom-dropdown" id="custom-dropdown">
        <div class="dropdown-header" id="dropdown-header">
          <span id="selected-country-text">请选择节点...</span>
          <div class="select-arrow" id="dropdown-arrow">
            <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </div>
        </div>

        <div class="dropdown-panel" id="dropdown-panel">
          <div class="dropdown-search">
            <input type="text" id="popup-search" placeholder="🔍 搜索节点或代码...">
          </div>
          <div class="dropdown-list" id="dropdown-list">
            <!-- Items dynamically created by JS -->
          </div>
        </div>
      </div>

      <div class="location-details">
        <div class="detail-row">
          <span class="detail-label">IP 地址</span>
          <span class="detail-value" id="detail-ip">--</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">时区</span>
          <span class="detail-value" id="detail-timezone">--</span>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/countries.js"></script>
  <script src="popup.js"></script>
</body>

</html>
